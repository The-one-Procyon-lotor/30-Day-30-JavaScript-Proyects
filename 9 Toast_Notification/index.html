<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toast Notification</title>
</head>

<body>
    <div class="buttons">
        <button onclick="showToast(successMsg)"> Success</button>
        <button onclick="showToast(errorMsg)"> Error</button>
        <button onclick="showToast(invalidMsg)"> Invalid</button>
    </div>

    <div id="toastBox"></div>

    <script>
        let toastBox = document.getElementById('toastBox');
        let successMsg = '<span>&#9989; </span> Successfully submitted';
        let errorMsg = '<span id="error">&#10060; </span> Please fix the error!';
        let invalidMsg = '<span id="invalid"> &#10071; </span> Invalid inpput, check again';
        function showToast(msg) {
            let toast = document.createElement('div');
            toast.classList.add('toast');
            toast.innerHTML = msg;
            toastBox.appendChild(toast);

            if(msg.includes('error')){
                toast.classList.add('error');
            }
            
            if (msg.includes('Invalid')) {
                toast.classList.add('invalid');
            }

            setTimeout(()=>{
                toast.remove();
            }, 6000);
        }
    </script>
</body>

</html>
